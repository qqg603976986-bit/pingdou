<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
    <!-- 外边框 -->
    <rect x="1" y="1" width="14" height="14" fill="#171717" />
    <!-- 内部底色(白色) -->
    <rect x="2" y="2" width="12" height="12" fill="#ffffff" />

    <!-- 像素风的字母 P，带有小阴影增加质感 -->
    <!-- P 的主干 -->
    <rect x="4" y="4" width="2" height="8" fill="#171717" />
    <rect x="6" y="4" width="4" height="2" fill="#171717" />
    <rect x="8" y="6" width="2" height="2" fill="#171717" />
    <rect x="6" y="8" width="4" height="2" fill="#171717" />
</svg>