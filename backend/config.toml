[app]
title = "Pingdou API"
description = "拼豆图纸生成器 API"
version = "1.0.0"
debug = false

[server]
host = "0.0.0.0"
port = 8000
reload = false
workers = 1
log_level = "info"

[cors]
allow_origins = ["http://localhost:3000", "http://127.0.0.1:3000"]
allow_credentials = true
allow_methods = ["*"]
allow_headers = ["*"]

[storage]
upload_dir = "storage/uploads"
ai_dir = "storage/ai"

[pipeline]
# 默认量化方法: "lab" | "rgb" | "hsv"
quantization_method = "lab"
dithering = false
resize_mode = "fit"
max_colors = 0
merge_threshold = 0.0
grayscale = false

[render]
cell_size = 20
show_grid = false
show_labels = true
show_color_codes = true
round_beads = false

[logging]
level = "INFO"
file = "pingdou.log"
format = "%(asctime)s | %(levelname)s | %(message)s"
date_format = "%Y-%m-%d %H:%M:%S"
